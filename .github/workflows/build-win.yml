name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Windows)
        run: npm run build
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}

      - name: Package (Windows)
        run: npx electron-builder --win --publish ${{ github.event.inputs.publish == 'true' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: FinMate-Windows
          path: dist/*.exe
          retention-days: 30
